<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Pole RPG</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "nipplejs": "https://esm.sh/nipplejs@0.10.1"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="currency-hud">
            <div class="currency"><span class="icon">🍬</span> <span id="candy-count">0</span></div>
            <div class="currency"><span class="icon">🧁</span> <span id="gumdrop-count">0</span></div>
            <div class="currency"><span class="icon">✨</span> <span id="sugar-count">0</span></div>
        </div>

        <div id="interaction-prompt" class="hidden">
            <span class="key-hint">E</span> <span id="interaction-text">Interact</span>
        </div>

        <div id="quest-log">
            <h3>Current Objective</h3>
            <p id="objective-text">Find Santa at the Workshop!</p>
        </div>

        <div id="chat-feed"></div>
    </div>

    <div id="joystick-zone"></div>

    <script type="module" src="js/main.js"></script>

</body>
</html>
